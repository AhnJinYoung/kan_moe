model:
  model_type: dense
  vocab_size: 32768
  max_seq_len: 2048
  n_layers: 12
  d_model: 768
  n_heads: 12
  ffn_dim: 16320
  n_experts: 16
  top_k: 2
  moe_layers: []
  dropout: 0.0
  gradient_checkpointing: true

data:
  train_path: /data/umoe_mod_share/fineweb_edu_100bt/tokenized_mistral_v3/train
  validation_path: /data/umoe_mod_share/fineweb_edu_100bt/tokenized_mistral_v3/validation
  train_glob: "*.bin"
  validation_glob: "*.bin"
  binary_dtype: uint16
  eos_token_id: 2
  tokenizer_path: /data/umoe_mod_share/fineweb_edu_100bt/tokenized_mistral_v3/tokenizer
  manifest_path: /data/umoe_mod_share/fineweb_edu_100bt/tokenized_mistral_v3/manifest.json
  validate_token_ids: true

train:
  output_dir: /data/umoe_mod_share/kan_moe/outputs/dense_500m
  seed: 1337
  sequence_length: 2048
  micro_batch_size: 2
  gradient_accumulation_steps: 32
  max_steps: 10000
  max_tokens: 5000000000
  learning_rate: 0.0003
  min_learning_rate: 0.00003
  warmup_steps: 200
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  grad_clip: 1.0
  precision: bf16
  use_tf32: true
  compile_model: false
  log_interval: 10
  eval_interval: 500
  eval_batches: 50
  save_interval: 500
  keep_last_checkpoints: 3
