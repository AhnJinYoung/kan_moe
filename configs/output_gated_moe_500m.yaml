model:
  model_type: output_gated_moe
  vocab_size: 32000
  max_seq_len: 2048
  n_layers: 12
  d_model: 768
  n_heads: 12
  ffn_dim: 1920
  n_experts: 16
  top_k: 2
  moe_layers: [1, 3, 5, 7, 9, 11]
  dropout: 0.0
  router_aux_loss_coef: 0.01
  router_z_loss_coef: 0.001
  gradient_checkpointing: true

data:
  input_format: parquet_text
  train_path: /data/umoe_mod_share/fineweb_edu_100bt/sample/100BT
  validation_path: ""
  train_glob: "*.parquet"
  validation_glob: "*.parquet"
  binary_dtype: uint16
  eos_token_id: 2
  tokenizer_path: /data/umoe_mod_share/llama2_tokenizer
  tokenizer_revision: ""
  manifest_path: ""
  validate_token_ids: true
  text_column: text
  hf_cache_dir: ""
  parquet_backend: direct
  parquet_read_batch_size: 4
  dataset_num_proc: 1
  tokenizer_batch_size: 4
  validation_rows: 10000

train:
  output_dir: /data/umoe_mod_share/kan_moe/outputs/output_gated_moe_500m_k2
  seed: 1337
  sequence_length: 2048
  micro_batch_size: 32
  gradient_accumulation_steps: 2
  max_steps: 50000
  max_tokens: 20000000000
  learning_rate: 0.0003
  min_learning_rate: 0.00003
  warmup_steps: 200
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  grad_clip: 1.0
  precision: bf16
  use_tf32: true
  compile_model: false
  log_interval: 10
  eval_interval: 500
  eval_batches: 50
  save_interval: 500
  keep_last_checkpoints: 3
